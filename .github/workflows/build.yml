name: Build CAP Relay APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run Gradle directly
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -50
      
      - name: Find any APKs
        run: find . -name "*.apk" -type f 2>/dev/null
      
      - name: Upload if exists
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: "**/*.apk"
          if-no-files-found: ignore
