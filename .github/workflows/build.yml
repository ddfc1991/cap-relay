name: Build CAP Relay APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Find APK
        run: |
          echo "Looking for APK..."
          find . -name "*.apk" 2>/dev/null
          find build -name "*.apk" 2>/dev/null || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cap-relay-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            android/build/outputs/apk/*/*.apk
            **/*.apk
          if-no-files-found: warn
