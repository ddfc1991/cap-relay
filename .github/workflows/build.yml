name: Build CAP Relay APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
      
      - name: Build APK
        run: flutter build apk --release || true
        env:
          FLUTTER_ALREADY_WATCHING: 1
      
      - name: Find and upload any APK
        run: |
          echo "Searching for APKs..."
          find /home/runner -name "*.apk" -type f 2>/dev/null | head -10
          find /opt -name "*.apk" -type f 2>/dev/null | head -10
          find . -name "*.apk" -type f 2>/dev/null | head -10
          # Also look at Gradle output dirs
          ls -la android/build/outputs/ 2>/dev/null || true
          ls -la build/ 2>/dev/null || true
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"
